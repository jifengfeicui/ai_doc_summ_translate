appId: com.summ-translate.app
productName: 文档总结与翻译系统
copyright: Copyright © 2025

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - node_modules/**/*

extraResources: []

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 文档总结与翻译系统
  artifactName: ${productName}-Setup-${version}.${ext}

dmg:
  title: ${productName} ${version}
  icon: build/icon.icns
  window:
    width: 540
    height: 380

compression: normal

